root = "."
tmp_dir = "tmp"

[build]
  cmd = "templ generate && npx tsc && go build -o ./tmp/main ./cmd/server/"
  bin = "./tmp/main"
  full_bin = "./tmp/main"
  include_ext = ["go", "templ", "css", "ts"]
  exclude_dir = ["tmp", "static", "node_modules", ".git"]
  exclude_regex = [".*_templ.go", "static/css/output.css"]
  delay = 200
  stop_on_error = false

[log]
  main_only = true

[misc]
  clean_on_exit = true
